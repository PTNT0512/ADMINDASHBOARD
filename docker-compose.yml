version: "3.9"

name: admin-app-stack

services:
  mongo:
    image: mongo:7.0
    container_name: adminapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: taixiu_dev
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  taixiu-backend:
    build:
      context: ./server/taixiu-backend
      dockerfile: Dockerfile
    container_name: adminapp-taixiu-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 18082
      HOST: 0.0.0.0
      WS_PATH: /websocket
      ENABLE_WEB_CLIENT: "true"
      WEB_BUILD_DIR: /app/client-build
      MONGODB_URI: mongodb://mongo:27017/taixiu_dev
      DEFAULT_USER_COIN: 1000000000
      SESSION_HISTORY_LIMIT: 100
      BET_DURATION_DOUBLE: 60
      RESULT_DURATION_DOUBLE: 15
      BET_DURATION_MD5: 55
      RESULT_DURATION_MD5: 15
      BET_DURATION_BAUCUA: 40
      RESULT_DURATION_BAUCUA: 10
      START_DURATION_XOCDIA: 2
      BET_DURATION_XOCDIA: 20
      REFUND_DURATION_XOCDIA: 3
      RESULT_DURATION_XOCDIA: 6
      ENABLE_BOT_XOCDIA: "true"
      BOT_BET_MIN_XOCDIA: 5000
      BOT_BET_MAX_XOCDIA: 250000
      BOT_BURST_MIN_XOCDIA: 1
      BOT_BURST_MAX_XOCDIA: 3
      ENABLE_JACKPOT_DOUBLE: "false"
    ports:
      - "18082:18082"
    volumes:
      - ./client/build/web-mobile:/app/client-build:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18082/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  taixiu-seed:
    build:
      context: ./server/taixiu-backend
      dockerfile: Dockerfile
    container_name: adminapp-taixiu-seed
    profiles: ["seed"]
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/taixiu_dev
    command: ["node", "src/scripts/seed-dev-data.js"]

volumes:
  mongo_data:
